<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact — Sékou Diarra</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=DM+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body data-page="contact">

  <main>
    <div class="container">
      <div class="page-header">
        <div class="section-label">Contact</div>
        <h1>Me contacter</h1>
        <p>Une question, une proposition de stage ou d'alternance ? N'hésitez pas à m'écrire.</p>
      </div>

      <div style="display:grid;grid-template-columns:3fr 2fr;gap:48px;align-items:start;max-width:860px">

        <form action="traitement.php" method="POST">
          <div class="form-row">
            <div class="form-group">
              <label class="form-label" for="prenom">Prénom</label>
              <input type="text" class="form-control" id="prenom" name="prenom" placeholder="Jean" required>
            </div>
            <div class="form-group">
              <label class="form-label" for="nom">Nom</label>
              <input type="text" class="form-control" id="nom" name="nom" placeholder="Dupont" required>
            </div>
          </div>

          <div class="form-group">
            <label class="form-label" for="email">Adresse e-mail</label>
            <input type="email" class="form-control" id="email" name="email" placeholder="jean.dupont@exemple.fr" required>
          </div>

          <div class="form-group">
            <label class="form-label" for="message">Message</label>
            <textarea class="form-control" id="message" name="message" placeholder="Votre message…" required></textarea>
          </div>

          <button type="submit" class="btn btn-primary">
            <i class="fas fa-paper-plane"></i> Envoyer le message
          </button>
        </form>

        <div style="display:flex;flex-direction:column;gap:16px">
          <div class="card">
            <div class="card-body">
              <div class="section-label" style="margin-bottom:16px">Retrouvez-moi</div>
              <div style="display:flex;flex-direction:column;gap:14px">
                <a href="#" style="display:flex;align-items:center;gap:12px;color:var(--text-muted);text-decoration:none" class="social-link-item">
                  <div style="width:36px;height:36px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;display:flex;align-items:center;justify-content:center;color:var(--accent)">
                    <i class="fab fa-linkedin"></i>
                  </div>
                  <span style="font-size:.88rem">LinkedIn</span>
                </a>
                <a href="#" style="display:flex;align-items:center;gap:12px;color:var(--text-muted);text-decoration:none">
                  <div style="width:36px;height:36px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;display:flex;align-items:center;justify-content:center;color:var(--accent)">
                    <i class="fab fa-instagram"></i>
                  </div>
                  <span style="font-size:.88rem">Instagram</span>
                </a>
              </div>
            </div>
          </div>
        </div>

      </div>
    </div>
  </main>

  <script src="main.js"></script>
</body>
</html>
